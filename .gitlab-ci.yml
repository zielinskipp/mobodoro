stages:
  - build
  - test
  - deploy

variables:
  VPS_USER: deploy
  VPS_HOST: zack154.mikrus.xyz
  VPS_PORT: "10154"
  APP_DIR: /home/deploy/mobodoro

build:
  stage: build
  image: node:22-alpine

  script:
    - npm ci
    - npm run build

  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - node_modules/

test:
  stage: test
  image: node:22-alpine

  script:
    - npm ci
    - npx vitest run --coverage --reporter=verbose

  coverage: '/All files\s+\|\s+([\d.]+)/'

  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    expire_in: 1 week

  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - node_modules/

deploy:
  stage: deploy
  image: ubuntu:latest

  before_script:
    - apt-get update -qy && apt-get install -y openssh-client rsync
    - eval $(ssh-agent -s)
    - printf '%s' "$SSH_PRIVATE_KEY" | base64 -d | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -p $VPS_PORT $VPS_HOST >> ~/.ssh/known_hosts

  script:
    # Upload built artifacts
    - rsync -az --delete -e "ssh -p $VPS_PORT" dist/ $VPS_USER@$VPS_HOST:$APP_DIR/dist/
    - rsync -az --delete -e "ssh -p $VPS_PORT" public/ $VPS_USER@$VPS_HOST:$APP_DIR/public/
    - scp -P $VPS_PORT ecosystem.config.cjs package.json package-lock.json $VPS_USER@$VPS_HOST:$APP_DIR/

    # Install prod deps and restart
    - ssh -p $VPS_PORT $VPS_USER@$VPS_HOST "
      source ~/.nvm/nvm.sh &&
      cd $APP_DIR &&
      npm ci --omit=dev &&
      pm2 restart mobodoro || pm2 start ecosystem.config.cjs --env production &&
      pm2 save
      "

  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE =~ /--deploy/'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - when: never
