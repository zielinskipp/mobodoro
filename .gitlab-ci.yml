stages:
  - build
  - deploy

variables:
  VPS_USER: deploy
  VPS_HOST: zack154.mikrus.xyz
  VPS_PORT: "10154"
  APP_DIR: /home/deploy/mobodoro

build:
  stage: build
  image: node:22-alpine
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - node_modules/

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - cp "$SSH_PRIVATE_KEY" ~/.ssh/id_ed25519
    - sed -i 's/\r//' ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -p $VPS_PORT $VPS_HOST >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    # Upload built artifacts
    - scp -P $VPS_PORT -r dist/ $VPS_USER@$VPS_HOST:$APP_DIR/
    - scp -P $VPS_PORT ecosystem.config.cjs package.json $VPS_USER@$VPS_HOST:$APP_DIR/
    # Install prod deps and restart
    - ssh -p $VPS_PORT $VPS_USER@$VPS_HOST "
      cd $APP_DIR &&
      npm ci --omit=dev &&
      pm2 restart mobodoro || pm2 start ecosystem.config.cjs --env production &&
      pm2 save
      "
  only:
    - main
