<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobodoro</title>
    <style>
      :root {
        --active-color: #667eea;
        --phase-bg-start: #1a1a2e;
        --phase-bg-end: #16213e;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        background: linear-gradient(
          135deg,
          var(--phase-bg-start),
          var(--phase-bg-end)
        );
        transition: background 0.8s ease;
        color: #fff;
        padding: 2rem;
      }

      /* ── Main row: orbit + sidebar ───────────────────── */
      .main-row {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 2rem;
      }

      .side-panel {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        align-items: flex-start;
      }

      /* ── Orbit area ──────────────────────────────────── */
      .orbit-area {
        position: relative;
        width: 400px;
        height: 400px;
        flex-shrink: 0;
      }

      /* ── Timer circle ────────────────────────────────── */
      .timer-circle {
        position: absolute;
        width: 180px;
        height: 180px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        border: 6px solid var(--active-color);
        transition: border-color 0.5s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(8px);
      }

      #timerDisplay {
        font-size: 2.8rem;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.05em;
      }

      #phaseDisplay {
        font-size: 0.85rem;
        opacity: 0.75;
        margin-top: 2px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      /* ── Avatars ─────────────────────────────────────── */
      .avatar {
        position: absolute;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--mobber-color, #555);
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        user-select: none;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
        z-index: 5;
      }

      .avatar.active {
        transform: scale(1.3);
        box-shadow:
          0 0 0 4px white,
          0 0 16px 6px var(--active-color);
        z-index: 10;
      }

      .avatar.add-btn {
        background: transparent;
        border: 2px dashed rgba(255, 255, 255, 0.6);
        font-size: 22px;
        font-weight: 300;
        color: rgba(255, 255, 255, 0.7);
        transition:
          background 0.2s,
          color 0.2s;
      }

      .avatar.add-btn:hover {
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
      }

      /* ── Context menu ────────────────────────────────── */
      .context-menu {
        z-index: 30;
        background: rgba(15, 15, 20, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        overflow: hidden;
        backdrop-filter: blur(12px);
        min-width: 130px;
      }

      .menu-item {
        padding: 8px 14px;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.15s;
      }

      .menu-item:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      /* ── Orbit track SVG ──────────────────────────────── */
      .orbit-track {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .orbit-track circle {
        fill: none;
        stroke: rgba(255, 255, 255, 0.18);
        stroke-width: 2;
        stroke-dasharray: 7 5;
      }

      /* ── Mob queue ────────────────────────────────────── */
      .mob-queue {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .queue-avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--mobber-color, #555);
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        user-select: none;
        flex-shrink: 0;
      }

      .queue-avatar.add-btn {
        background: transparent;
        border: 2px dashed rgba(255, 255, 255, 0.6);
        font-size: 22px;
        font-weight: 300;
        color: rgba(255, 255, 255, 0.7);
        transition:
          background 0.2s,
          color 0.2s;
      }

      .queue-avatar.add-btn:hover {
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
      }

      .queue-avatar.active {
        transform: scale(1.2);
        box-shadow:
          0 0 0 3px white,
          0 0 12px 4px var(--active-color);
      }

      /* ── Traveler dot ────────────────────────────────── */
      .traveler {
        position: absolute;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--active-color);
        box-shadow: 0 0 8px 2px var(--active-color);
        z-index: 3;
        pointer-events: none;
        transition:
          top 0.5s linear,
          left 0.5s linear;
      }

      /* ── Add form (floating) ─────────────────────────── */
      .add-form {
        display: flex;
        gap: 4px;
        align-items: center;
        background: rgba(15, 15, 20, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        padding: 6px 8px;
        backdrop-filter: blur(12px);
      }

      .queue-input,
      .rename-input {
        padding: 4px 8px;
        border-radius: 6px;
        border: 2px solid rgba(255, 255, 255, 0.6);
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        font-size: 13px;
        width: 110px;
        outline: none;
        height: 48px;
      }

      /* ── Controls ────────────────────────────────────── */
      .controls {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      button {
        padding: 0.6rem 0.9rem;
        font-size: 1.25rem;
        border: 2px solid rgba(255, 255, 255, 0.5);
        background: rgba(255, 255, 255, 0.15);
        color: white;
        border-radius: 10px;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.15s;
        font-weight: 500;
      }

      button:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.28);
        transform: translateY(-2px);
      }

      button:disabled {
        opacity: 0.35;
        cursor: default;
      }

      /* ── Settings button (fixed top-right) ─────────── */
      .settings-btn {
        position: fixed;
        top: 1.25rem;
        right: 1.25rem;
        z-index: 50;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        padding: 0;
        font-size: 1.35rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.2s,
          transform 0.35s;
      }

      .settings-btn:hover:not(:disabled) {
        transform: rotate(50deg) !important;
      }

      /* ── Settings panel ──────────────────────────────── */
      .settings-panel {
        position: fixed;
        top: 4.75rem;
        right: 1.25rem;
        z-index: 49;
        background: rgba(8, 8, 20, 0.94);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 16px;
        padding: 1.25rem 1.5rem 1rem;
        backdrop-filter: blur(20px);
        min-width: 250px;
        display: none;
        flex-direction: column;
        gap: 1.25rem;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      }

      .settings-panel.open {
        display: flex;
      }

      .setting-item {
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
      }

      .setting-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }

      .setting-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.13em;
        opacity: 0.5;
      }

      .setting-value-display {
        font-size: 1.4rem;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        color: var(--active-color);
        text-shadow: 0 0 10px var(--active-color);
        transition: text-shadow 0.3s;
      }

      .setting-unit {
        font-size: 0.75rem;
        opacity: 0.45;
        font-weight: 400;
        margin-left: 2px;
      }

      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 5px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.18);
        outline: none;
        cursor: pointer;
        border: none;
        padding: 0;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--active-color);
        box-shadow: 0 0 10px 3px var(--active-color);
        cursor: pointer;
        transition: transform 0.15s;
      }

      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.25);
      }

      input[type="range"]::-moz-range-thumb {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--active-color);
        box-shadow: 0 0 10px 3px var(--active-color);
        cursor: pointer;
        border: none;
        transition: transform 0.15s;
      }

      .settings-apply {
        font-size: 0.9rem;
        padding: 0.45rem 1rem;
        align-self: flex-end;
        letter-spacing: 0.05em;
      }

      /* ── Status dot ──────────────────────────────────── */
      .status {
        font-size: 0.8rem;
        opacity: 0.6;
      }

      .status.connected {
        color: #4ade80;
        opacity: 1;
      }
      .status.disconnected {
        color: #f87171;
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="main-row">
      <!-- Orbit + timer -->
      <div class="orbit-area" id="orbitArea">
        <svg
          class="orbit-track"
          viewBox="0 0 400 400"
          xmlns="http://www.w3.org/2000/svg"
        >
          <circle cx="200" cy="200" r="160" />
        </svg>
        <div class="timer-circle" id="timerCircle">
          <span id="timerDisplay">25:00</span>
          <span id="phaseDisplay">Work</span>
        </div>
      </div>

      <!-- Right sidebar -->
      <div class="side-panel">
        <!-- Mob queue -->
        <div class="mob-queue" id="mobQueue"></div>

        <!-- Main controls -->
        <div class="controls">
          <button id="startBtn" title="Start">▶</button>
          <button id="pauseBtn" title="Pause">⏸</button>
          <button id="resetBtn" title="Reset">↺</button>
          <button id="skipBtn" title="Skip">⏭</button>
        </div>

        <div class="status" id="status">Connecting…</div>
      </div>
      <!-- /.side-panel -->
    </div>
    <!-- /.main-row -->

    <!-- Settings button (fixed top-right) -->
    <button class="settings-btn" id="settingsBtn" title="Settings">⚙</button>

    <!-- Settings panel -->
    <div class="settings-panel" id="settingsPanel">
      <div class="setting-item">
        <div class="setting-header">
          <span class="setting-label">Work</span>
          <span class="setting-value-display">
            <span id="workMinutesVal">25</span
            ><span class="setting-unit"> min</span>
          </span>
        </div>
        <input type="range" id="workMinutes" min="1" max="60" value="25" />
      </div>
      <div class="setting-item">
        <div class="setting-header">
          <span class="setting-label">Break</span>
          <span class="setting-value-display">
            <span id="breakMinutesVal">5</span
            ><span class="setting-unit"> min</span>
          </span>
        </div>
        <input type="range" id="breakMinutes" min="1" max="30" value="5" />
      </div>
      <div class="setting-item">
        <div class="setting-header">
          <span class="setting-label">Long break after</span>
          <span class="setting-value-display">
            <span id="rotationsBeforeBreakVal">1</span
            ><span class="setting-unit"> rotation</span>
          </span>
        </div>
        <input
          type="range"
          id="rotationsBeforeBreak"
          min="1"
          max="10"
          value="1"
        />
      </div>
      <button id="configureBtn" class="settings-apply">Apply ✓</button>
    </div>

    <script src="/room.js" type="module"></script>
  </body>
</html>
