<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobodoro</title>
    <style>
      :root {
        --active-color:   #667eea;
        --phase-bg-start: #1a1a2e;
        --phase-bg-end:   #16213e;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        background: linear-gradient(135deg, var(--phase-bg-start), var(--phase-bg-end));
        transition: background 0.8s ease;
        color: #fff;
        padding: 2rem;
      }

      /* ── Orbit area ──────────────────────────────────── */
      .orbit-area {
        position: relative;
        width: 400px;
        height: 400px;
        flex-shrink: 0;
      }

      /* ── Timer circle ────────────────────────────────── */
      .timer-circle {
        position: absolute;
        width: 180px;
        height: 180px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        border: 6px solid var(--active-color);
        transition: border-color 0.5s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.25);
        backdrop-filter: blur(8px);
      }

      #timerDisplay {
        font-size: 2.8rem;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.05em;
      }

      #phaseDisplay {
        font-size: 0.85rem;
        opacity: 0.75;
        margin-top: 2px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      /* ── Avatars ─────────────────────────────────────── */
      .avatar {
        position: absolute;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--mobber-color, #555);
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        user-select: none;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        z-index: 5;
      }

      .avatar.active {
        transform: scale(1.3);
        box-shadow: 0 0 0 4px white, 0 0 16px 6px var(--active-color);
        z-index: 10;
      }

      .avatar.add-btn {
        background: transparent;
        border: 2px dashed rgba(255,255,255,0.6);
        font-size: 22px;
        font-weight: 300;
        color: rgba(255,255,255,0.7);
        transition: background 0.2s, color 0.2s;
      }

      .avatar.add-btn:hover {
        background: rgba(255,255,255,0.15);
        color: #fff;
      }

      /* ── Context menu ────────────────────────────────── */
      .context-menu {
        position: absolute;
        z-index: 30;
        background: rgba(15,15,20,0.92);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 8px;
        overflow: hidden;
        backdrop-filter: blur(12px);
        min-width: 130px;
      }

      .menu-item {
        padding: 8px 14px;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.15s;
      }

      .menu-item:hover {
        background: rgba(255,255,255,0.15);
      }

      /* ── Add form ─────────────────────────────────────── */
      .add-form {
        position: absolute;
        z-index: 20;
        display: flex;
        gap: 4px;
      }

      .add-input, .rename-input {
        padding: 4px 8px;
        border-radius: 6px;
        border: 2px solid rgba(255,255,255,0.6);
        background: rgba(0,0,0,0.6);
        color: #fff;
        font-size: 13px;
        width: 110px;
        outline: none;
      }

      .add-confirm {
        padding: 4px 8px;
        border-radius: 6px;
        border: 2px solid rgba(255,255,255,0.5);
        background: rgba(255,255,255,0.2);
        color: #fff;
        cursor: pointer;
        font-size: 13px;
      }

      /* ── Controls ────────────────────────────────────── */
      .controls {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      button {
        padding: 0.75rem 1.5rem;
        font-size: 0.95rem;
        border: 2px solid rgba(255,255,255,0.5);
        background: rgba(255,255,255,0.15);
        color: white;
        border-radius: 10px;
        cursor: pointer;
        transition: background 0.2s, transform 0.15s;
        font-weight: 500;
      }

      button:hover:not(:disabled) {
        background: rgba(255,255,255,0.28);
        transform: translateY(-2px);
      }

      button:disabled {
        opacity: 0.35;
        cursor: default;
      }

      /* ── Config section ──────────────────────────────── */
      details {
        background: rgba(255,255,255,0.08);
        border-radius: 12px;
        padding: 0.75rem 1.25rem;
        width: 400px;
        max-width: 100%;
      }

      summary {
        cursor: pointer;
        font-size: 0.9rem;
        opacity: 0.75;
        list-style: none;
        user-select: none;
      }

      summary::-webkit-details-marker { display: none; }

      .config-row {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        margin-top: 0.75rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      .config-row input[type=number] {
        width: 80px;
        padding: 0.4rem;
        border-radius: 6px;
        border: 2px solid rgba(255,255,255,0.4);
        background: rgba(255,255,255,0.15);
        color: white;
        text-align: center;
        font-size: 0.9rem;
      }

      /* ── Status dot ──────────────────────────────────── */
      .status {
        font-size: 0.8rem;
        opacity: 0.6;
      }

      .status.connected    { color: #4ade80; opacity: 1; }
      .status.disconnected { color: #f87171; opacity: 1; }
    </style>
  </head>
  <body>
    <!-- Orbit + timer -->
    <div class="orbit-area" id="orbitArea">
      <div class="timer-circle" id="timerCircle">
        <span id="timerDisplay">25:00</span>
        <span id="phaseDisplay">Work</span>
      </div>
    </div>

    <!-- Main controls -->
    <div class="controls">
      <button id="startBtn">Start</button>
      <button id="pauseBtn">Pause</button>
      <button id="resetBtn">Reset</button>
      <button id="skipBtn">Skip ⏭</button>
    </div>

    <!-- Session config (collapsed) -->
    <details>
      <summary>▼ Session config</summary>
      <div class="config-row">
        <input type="number" id="workMinutes"          min="1" max="60" value="25" title="Work minutes" />
        <input type="number" id="breakMinutes"         min="1" max="30" value="5"  title="Break minutes" />
        <input type="number" id="rotationsBeforeBreak" min="1" max="10" value="1"  title="Rotations before break" />
        <button id="configureBtn">Apply</button>
      </div>
    </details>

    <div class="status" id="status">Connecting…</div>

    <script src="/room.js" type="module"></script>
  </body>
</html>
