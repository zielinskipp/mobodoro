<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobodoro</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
      }

      .container {
        text-align: center;
        background: rgba(255, 255, 255, 0.1);
        padding: 3rem;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        min-width: 400px;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 2rem;
        font-weight: 300;
      }

      .timer {
        font-size: 6rem;
        font-weight: 700;
        margin: 2rem 0;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.1em;
      }

      .phase {
        font-size: 1.5rem;
        margin-bottom: 2rem;
        text-transform: capitalize;
        opacity: 0.9;
      }

      .controls {
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin-top: 2rem;
      }

      button {
        padding: 1rem 2rem;
        font-size: 1rem;
        border: 2px solid rgba(255, 255, 255, 0.5);
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 500;
      }

      button:hover {
        background: rgba(255, 255, 255, 0.3);
        border-color: rgba(255, 255, 255, 0.8);
        transform: translateY(-2px);
      }

      button:active {
        transform: translateY(0);
      }

      .status {
        margin-top: 2rem;
        font-size: 0.9rem;
        opacity: 0.7;
      }

      .status.connected {
        color: #4ade80;
      }

      .status.disconnected {
        color: #f87171;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Mobodoro</h1>

      <div class="phase" id="phase">Work</div>
      <div class="timer" id="timer">25:00</div>

      <div class="controls">
        <button id="startBtn">Start</button>
        <button id="pauseBtn">Pause</button>
        <button id="resetBtn">Reset</button>
        <button id="skipBtn">Skip Phase ⏭️</button>
      </div>

      <!-- Configuration Section -->
      <div
        style="
          margin-top: 2rem;
          padding: 1.5rem;
          border-radius: 10px;
          background: rgba(255, 255, 255, 0.1);
        "
      >
        <h2 style="font-size: 1.2rem; margin-bottom: 1rem; font-weight: 400">
          Session Configuration
        </h2>
        <div class="controls" style="gap: 0.5rem; flex-wrap: wrap">
          <input
            type="number"
            id="workMinutes"
            placeholder="Work (min)"
            min="1"
            max="60"
            value="25"
            style="
              width: 100px;
              padding: 0.5rem;
              border-radius: 5px;
              border: 2px solid rgba(255, 255, 255, 0.5);
              background: rgba(255, 255, 255, 0.2);
              color: white;
              text-align: center;
            "
          />
          <input
            type="number"
            id="breakMinutes"
            placeholder="Break (min)"
            min="1"
            max="30"
            value="5"
            style="
              width: 100px;
              padding: 0.5rem;
              border-radius: 5px;
              border: 2px solid rgba(255, 255, 255, 0.5);
              background: rgba(255, 255, 255, 0.2);
              color: white;
              text-align: center;
            "
          />
          <input
            type="number"
            id="rotationsBeforeBreak"
            placeholder="Rotations"
            min="1"
            max="10"
            value="1"
            style="
              width: 100px;
              padding: 0.5rem;
              border-radius: 5px;
              border: 2px solid rgba(255, 255, 255, 0.5);
              background: rgba(255, 255, 255, 0.2);
              color: white;
              text-align: center;
            "
          />
          <button id="configureBtn">Apply Config</button>
        </div>
        <div
          style="
            margin-top: 0.5rem;
            font-size: 0.8rem;
            opacity: 0.6;
            text-align: center;
          "
        >
          Configure before starting or while paused
        </div>
      </div>

      <div class="controls" style="margin-top: 1rem; gap: 0.5rem">
        <input
          type="number"
          id="setMinutes"
          placeholder="Min"
          min="0"
          max="59"
          style="
            width: 60px;
            padding: 0.5rem;
            border-radius: 5px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-align: center;
          "
        />
        <input
          type="number"
          id="setSeconds"
          placeholder="Sec"
          min="0"
          max="59"
          style="
            width: 60px;
            padding: 0.5rem;
            border-radius: 5px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-align: center;
          "
        />
        <button id="setTimerBtn">Set Timer</button>
      </div>

      <!-- Mobbers Section -->
      <div
        style="
          margin-top: 2rem;
          padding-top: 2rem;
          border-top: 2px solid rgba(255, 255, 255, 0.2);
        "
      >
        <h2 style="font-size: 1.2rem; margin-bottom: 1rem; font-weight: 400">
          Mob
        </h2>

        <div
          id="currentMobber"
          style="font-size: 1.5rem; margin-bottom: 1rem; opacity: 0.9"
        >
          No mobbers yet
        </div>

        <div
          id="mobbersList"
          style="margin-bottom: 1rem; font-size: 0.9rem; opacity: 0.7"
        ></div>

        <div class="controls" style="gap: 0.5rem; margin-bottom: 0.5rem">
          <input
            type="text"
            id="mobberNameInput"
            placeholder="Mobber name"
            style="
              flex: 1;
              padding: 0.5rem;
              border-radius: 5px;
              border: 2px solid rgba(255, 255, 255, 0.5);
              background: rgba(255, 255, 255, 0.2);
              color: white;
            "
          />
          <button id="addMobberBtn">Add</button>
        </div>

        <div class="controls" style="gap: 0.5rem">
          <button id="rotateMobberBtn" style="flex: 1">Next Mobber</button>
          <button id="removeMobberBtn">Remove Current</button>
        </div>
      </div>

      <div class="status" id="status">Connecting...</div>
    </div>

    <script>
      const timerEl = document.getElementById("timer");
      const phaseEl = document.getElementById("phase");
      const statusEl = document.getElementById("status");
      const startBtn = document.getElementById("startBtn");
      const pauseBtn = document.getElementById("pauseBtn");
      const resetBtn = document.getElementById("resetBtn");
      const skipBtn = document.getElementById("skipBtn");
      const setTimerBtn = document.getElementById("setTimerBtn");
      const setMinutesInput = document.getElementById("setMinutes");
      const setSecondsInput = document.getElementById("setSeconds");

      const configureBtn = document.getElementById("configureBtn");
      const workMinutesInput = document.getElementById("workMinutes");
      const breakMinutesInput = document.getElementById("breakMinutes");
      const rotationsBeforeBreakInput = document.getElementById(
        "rotationsBeforeBreak",
      );

      const currentMobberEl = document.getElementById("currentMobber");
      const mobbersListEl = document.getElementById("mobbersList");
      const mobberNameInput = document.getElementById("mobberNameInput");
      const addMobberBtn = document.getElementById("addMobberBtn");
      const rotateMobberBtn = document.getElementById("rotateMobberBtn");
      const removeMobberBtn = document.getElementById("removeMobberBtn");

      let ws = null;
      let sessionId = null;

      // Format time display
      function formatTime(minutes, seconds) {
        return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }

      // Update UI with session state
      function updateUI(session) {
        // Store session for other functions to access
        sessionStorage.setItem("currentSession", JSON.stringify(session));

        timerEl.textContent = formatTime(
          session.timer.minutes,
          session.timer.seconds,
        );
        phaseEl.textContent =
          session.phase === "work"
            ? "Work"
            : session.phase === "shortBreak"
              ? "Short Break"
              : "Long Break";

        // Update configuration inputs
        workMinutesInput.value = session.duration.minutes;
        breakMinutesInput.value = session.breakDuration.minutes;
        rotationsBeforeBreakInput.value = session.rotationsBeforeBreak;

        // Update button states
        if (session.timer.isRunning) {
          startBtn.disabled = true;
          pauseBtn.disabled = false;
        } else {
          startBtn.disabled = false;
          pauseBtn.disabled = true;
        }

        // Update mobbers display
        if (session.mobbers && session.mobbers.length > 0) {
          const currentMobber = session.mobbers[session.currentMobberIndex];
          currentMobberEl.textContent = `🎯 Current: ${currentMobber}`;

          // Show all mobbers with highlighting for current
          mobbersListEl.innerHTML = session.mobbers
            .map((mobber, index) => {
              const isCurrent = index === session.currentMobberIndex;
              return `<span style="${isCurrent ? "font-weight: bold; opacity: 1;" : ""}">${isCurrent ? "→ " : ""}${mobber}</span>`;
            })
            .join(" • ");

          rotateMobberBtn.disabled = false;
          removeMobberBtn.disabled = false;
        } else {
          currentMobberEl.textContent = "No mobbers yet";
          mobbersListEl.innerHTML = "";
          rotateMobberBtn.disabled = true;
          removeMobberBtn.disabled = true;
        }
      }

      // Create session and connect
      async function init() {
        try {
          // Get session ID from URL path: /room/:sessionId
          const pathParts = window.location.pathname.split("/");
          sessionId = pathParts[pathParts.length - 1];

          if (!sessionId) {
            statusEl.textContent = "No room ID in URL";
            statusEl.className = "status disconnected";
            return;
          }

          // Connect WebSocket
          const protocol =
            window.location.protocol === "https:" ? "wss:" : "ws:";
          const wsUrl = `${protocol}//${window.location.host}/ws/${sessionId}`;

          ws = new WebSocket(wsUrl);

          ws.onopen = () => {
            statusEl.textContent = "Connected";
            statusEl.className = "status connected";
          };

          ws.onmessage = (event) => {
            const session = JSON.parse(event.data);
            updateUI(session);
          };

          ws.onclose = () => {
            statusEl.textContent = "Disconnected";
            statusEl.className = "status disconnected";
          };

          ws.onerror = (error) => {
            console.error("WebSocket error:", error);
            statusEl.textContent = "Connection error";
            statusEl.className = "status disconnected";
          };
        } catch (error) {
          console.error("Failed to initialize:", error);
          statusEl.textContent = "Failed to connect";
          statusEl.className = "status disconnected";
        }
      }

      // Send command to server
      function sendCommand(command) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ command }));
        }
      }

      // Button handlers
      startBtn.addEventListener("click", () => sendCommand("start"));
      pauseBtn.addEventListener("click", () => sendCommand("pause"));
      resetBtn.addEventListener("click", () => sendCommand("reset"));
      skipBtn.addEventListener("click", () => sendCommand("skip"));

      configureBtn.addEventListener("click", () => {
        const workMinutes = parseInt(workMinutesInput.value) || 25;
        const breakMinutes = parseInt(breakMinutesInput.value) || 5;
        const rotationsBeforeBreak =
          parseInt(rotationsBeforeBreakInput.value) || 1;

        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(
            JSON.stringify({
              command: "configure",
              workMinutes,
              breakMinutes,
              rotationsBeforeBreak,
            }),
          );
        }
      });

      setTimerBtn.addEventListener("click", () => {
        const minutes = parseInt(setMinutesInput.value) || 0;
        const seconds = parseInt(setSecondsInput.value) || 0;

        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(
            JSON.stringify({
              command: "setTimer",
              minutes,
              seconds,
            }),
          );
        }
      });

      // Mobber button handlers
      addMobberBtn.addEventListener("click", () => {
        const name = mobberNameInput.value.trim();
        if (name && ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ command: "addMobber", name }));
          mobberNameInput.value = ""; // Clear input
        }
      });

      // Allow Enter key to add mobber
      mobberNameInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          addMobberBtn.click();
        }
      });

      rotateMobberBtn.addEventListener("click", () => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ command: "rotateMobber" }));
        }
      });

      removeMobberBtn.addEventListener("click", () => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          // Get current mobber name from session state
          // We'll need to track this in a variable
          const currentSession = JSON.parse(
            sessionStorage.getItem("currentSession") || "{}",
          );
          if (currentSession.mobbers && currentSession.mobbers.length > 0) {
            const currentMobber =
              currentSession.mobbers[currentSession.currentMobberIndex];
            ws.send(
              JSON.stringify({ command: "removeMobber", name: currentMobber }),
            );
          }
        }
      });

      // Initialize on load
      init();
    </script>
  </body>
</html>
