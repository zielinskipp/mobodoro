<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobodoro</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
      }

      .container {
        text-align: center;
        background: rgba(255, 255, 255, 0.1);
        padding: 3rem;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        min-width: 400px;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 2rem;
        font-weight: 300;
      }

      .timer {
        font-size: 6rem;
        font-weight: 700;
        margin: 2rem 0;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.1em;
      }

      .phase {
        font-size: 1.5rem;
        margin-bottom: 2rem;
        text-transform: capitalize;
        opacity: 0.9;
      }

      .controls {
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin-top: 2rem;
      }

      button {
        padding: 1rem 2rem;
        font-size: 1rem;
        border: 2px solid rgba(255, 255, 255, 0.5);
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 500;
      }

      button:hover {
        background: rgba(255, 255, 255, 0.3);
        border-color: rgba(255, 255, 255, 0.8);
        transform: translateY(-2px);
      }

      button:active {
        transform: translateY(0);
      }

      .status {
        margin-top: 2rem;
        font-size: 0.9rem;
        opacity: 0.7;
      }

      .status.connected {
        color: #4ade80;
      }

      .status.disconnected {
        color: #f87171;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Mobodoro</h1>

      <div class="phase" id="phase">Work</div>
      <div class="timer" id="timer">25:00</div>

      <div class="controls">
        <button id="startBtn">Start</button>
        <button id="pauseBtn">Pause</button>
        <button id="resetBtn">Reset</button>
      </div>

      <div class="status" id="status">Connecting...</div>
    </div>

    <script>
      const timerEl = document.getElementById("timer");
      const phaseEl = document.getElementById("phase");
      const statusEl = document.getElementById("status");
      const startBtn = document.getElementById("startBtn");
      const pauseBtn = document.getElementById("pauseBtn");
      const resetBtn = document.getElementById("resetBtn");

      let ws = null;
      let sessionId = null;

      // Format time display
      function formatTime(minutes, seconds) {
        return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }

      // Update UI with session state
      function updateUI(session) {
        timerEl.textContent = formatTime(
          session.timer.minutes,
          session.timer.seconds,
        );
        phaseEl.textContent =
          session.phase === "work"
            ? "Work"
            : session.phase === "shortBreak"
              ? "Short Break"
              : "Long Break";

        // Update button states
        if (session.timer.isRunning) {
          startBtn.disabled = true;
          pauseBtn.disabled = false;
        } else {
          startBtn.disabled = false;
          pauseBtn.disabled = true;
        }
      }

      // Create session and connect
      async function init() {
        try {
          // Create new session
          const response = await fetch("/sessions", { method: "POST" });
          const data = await response.json();
          sessionId = data.sessionId;

          // Connect WebSocket
          const protocol =
            window.location.protocol === "https:" ? "wss:" : "ws:";
          const wsUrl = `${protocol}//${window.location.host}/session/${sessionId}`;

          ws = new WebSocket(wsUrl);

          ws.onopen = () => {
            statusEl.textContent = "Connected";
            statusEl.className = "status connected";
          };

          ws.onmessage = (event) => {
            const session = JSON.parse(event.data);
            updateUI(session);
          };

          ws.onclose = () => {
            statusEl.textContent = "Disconnected";
            statusEl.className = "status disconnected";
          };

          ws.onerror = (error) => {
            console.error("WebSocket error:", error);
            statusEl.textContent = "Connection error";
            statusEl.className = "status disconnected";
          };
        } catch (error) {
          console.error("Failed to initialize:", error);
          statusEl.textContent = "Failed to connect";
          statusEl.className = "status disconnected";
        }
      }

      // Send command to server
      function sendCommand(command) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ command }));
        }
      }

      // Button handlers
      startBtn.addEventListener("click", () => sendCommand("start"));
      pauseBtn.addEventListener("click", () => sendCommand("pause"));
      resetBtn.addEventListener("click", () => sendCommand("reset"));

      // Initialize on load
      init();
    </script>
  </body>
</html>
